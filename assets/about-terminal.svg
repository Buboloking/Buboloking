<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">About me terminal</title>
  <desc id="desc">A macOS-style terminal showing Buboloking profile information.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050505"/>
      <stop offset="0.52" stop-color="#0c0708"/>
      <stop offset="1" stop-color="#030303"/>
    </linearGradient>

    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="72">
      <stop stop-color="#21191a"/>
      <stop offset="1" stop-color="#100c0d"/>
    </linearGradient>

    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#eadfd6" opacity="0.025"/>
    </pattern>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.75"/>
    </filter>

    <clipPath id="screen">
      <rect x="24" y="24" width="1152" height="712" rx="20"/>
    </clipPath>

    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .text { fill: #eadfd6; font-size: 27px; }
      .muted { fill: #9f8f8b; font-size: 22px; }
      .prompt { fill: #8e2631; font-size: 27px; font-weight: 700; }
      .label { fill: #c7b8b2; font-size: 26px; }
      .value { fill: #eadfd6; font-size: 26px; }
      .status { fill: #d6c3ba; font-size: 26px; }
      .cursor { animation: blink 1s steps(1,end) infinite; }
      .flicker { animation: flicker 7s linear infinite; }
      @keyframes blink { 0%, 48% { opacity: 1; } 49%, 100% { opacity: 0; } }
      @keyframes flicker { 0%, 93%, 95%, 100% { opacity: 1; } 94% { opacity: .76; } 96% { opacity: .9; } }
    </style>
  </defs>

  <rect width="1200" height="760" fill="#020202"/>

  <g filter="url(#shadow)">
    <rect x="24" y="24" width="1152" height="712" rx="20" fill="url(#bg)" stroke="#651019" stroke-width="3"/>
  </g>

  <g clip-path="url(#screen)">
    <rect x="24" y="24" width="1152" height="58" fill="url(#bar)"/>
    <rect x="24" y="81" width="1152" height="1" fill="#3a171b" opacity="0.65"/>

    <circle cx="58" cy="53" r="8" fill="#8e2631"/>
    <circle cx="84" cy="53" r="8" fill="#6f5d42"/>
    <circle cx="110" cy="53" r="8" fill="#4e6550"/>

    <text x="600" y="61" text-anchor="middle" class="mono muted">king@github — zsh</text>

    <g class="mono flicker">
      <text x="66" y="125" class="muted">Last login: now on github</text>

      <text x="66" y="180" class="prompt">&gt; hostname</text>
      <text x="66" y="220" class="text">github.com/Buboloking</text>

      <text x="66" y="280" class="prompt">&gt; whoami</text>
      <text x="66" y="320" class="text">i'm King</text>
      <text x="66" y="360" class="text">i'm student</text>

      <text x="66" y="420" class="prompt">&gt; system_info</text>

      <text x="66" y="468" class="label">OS</text>
      <text x="220" y="468" class="value">: macOS</text>

      <text x="66" y="508" class="label">Shell</text>
      <text x="220" y="508" class="value">: zsh</text>

      <text x="66" y="548" class="label">Editor</text>
      <text x="220" y="548" class="value">: VS Code</text>

      <text x="66" y="588" class="label">Location</text>
      <text x="220" y="588" class="value">: Italy</text>

      <text x="66" y="628" class="label">Status</text>
      <text x="220" y="628" class="status">: Coding...</text>

      <text x="66" y="690" class="text">🔑 Enter password:</text>
      <rect x="353" y="666" width="14" height="29" rx="2" fill="#8e2631" class="cursor" filter="url(#glow)"/>
    </g>

    <rect x="24" y="24" width="1152" height="712" fill="url(#scanlines)" pointer-events="none"/>
    <rect x="24" y="24" width="1152" height="712" fill="none" stroke="#eadfd6" stroke-opacity="0.035" stroke-width="2"/>
  </g>
</svg>